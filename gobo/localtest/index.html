<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loopback probe</title>
</head>
<body style="font-family: sans-serif; padding: 2rem;">
  <h1>Loopback probe</h1>
  <p>Redirecting to <code>http://127.0.0.1:52847/</code> from this public HTTPS page…</p>
  <p>If you see a browser <strong>"connection refused / can't reach"</strong> error for 127.0.0.1,
     the navigation was <em>allowed</em> (good). If you see a <strong>"blocked"</strong> /
     policy error, it was refused.</p>
  <p><a id="manual" href="http://127.0.0.1:52847/">Tap to try manually</a></p>
  <script>
    // Mimic the OAuth redirect: a public https origin navigating to device localhost.
    setTimeout(function () { window.location.href = "http://127.0.0.1:52847/"; }, 1200);
  </script>
</body>
</html>
